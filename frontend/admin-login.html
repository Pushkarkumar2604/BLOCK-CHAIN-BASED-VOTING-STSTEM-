<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">Admin Login</div>

        <div class="nav-links">
            <a href="index.html">Back to Voting</a>
        </div>
    </nav>

    <div class="form-container">

        <h1>Admin Login</h1>

        <input
            type="password"
            id="adminPassword"
            placeholder="Enter Admin Password"
        >

        <button onclick="adminLoginWithoutOTP()">
            Login
        </button>

        <p id="adminLoginMessage"></p>

    </div>

    <script>
        console.log("ADMIN LOGIN WITHOUT OTP LOADED");

        function showMessage(message, color) {
            const messageBox = document.getElementById("adminLoginMessage");

            if (messageBox) {
                messageBox.innerText = message;
                messageBox.style.color = color;
                messageBox.style.fontWeight = "900";
            }
        }

        async function adminLoginWithoutOTP() {
            const password = document.getElementById("adminPassword").value.trim();

            if (password === "") {
                showMessage("Please enter admin password", "red");
                alert("Please enter admin password");
                return;
            }

            try {
                const response = await fetch(window.location.origin + "/admin_login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password: password
                    })
                });

                const data = await response.json();

                console.log("Admin login response:", data);

                if (data.success === true) {
                    showMessage("Admin login successful", "green");
                    alert("Admin login successful");

                    localStorage.setItem("adminLoggedIn", "true");

                    setTimeout(() => {
                        window.location.href = "admin-dashboard.html";
                    }, 700);
                } else {
                    showMessage(data.message, "red");
                    alert(data.message);
                }

            } catch (error) {
                console.log("Admin login error:", error);

                showMessage("Backend connection failed", "red");
                alert("Backend connection failed");
            }
        }
    </script>

</body>
</html>
