<!DOCTYPE html>
<html>
<head>
    <title>Voter Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            Voter Registration
        </div>

        <div class="nav-links">
            <a href="index.html">Back to Voting</a>
            <a href="candidate-registration.html">Candidate Registration</a>
            <a href="admin-login.html">Admin Login</a>
        </div>
    </nav>

    <section class="main-voting-area">

        <div class="vote-box registration-card">

            <h1>Register Voter</h1>

            <p class="page-subtitle">
                Enter voter details, start camera, capture face, then register the voter.
            </p>

            <div class="registration-form">

                <input 
                    type="text" 
                    id="voter_id" 
                    placeholder="Enter Voter ID"
                    autocomplete="off"
                >

                <input 
                    type="text" 
                    id="name" 
                    placeholder="Enter Full Name"
                    autocomplete="off"
                >

                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter Email"
                    autocomplete="off"
                >

            </div>

            <h2 class="section-title">Face Registration</h2>

            <div class="camera-box">
                <video 
                    id="reg_camera" 
                    autoplay 
                    muted 
                    playsinline
                ></video>
            </div>

            <div class="button-row">
                <button 
                    type="button" 
                    onclick="startRegistrationCamera()"
                >
                    Start Camera
                </button>

                <button 
                    type="button" 
                    onclick="captureFaceForRegistration()"
                >
                    Capture Face
                </button>
            </div>

            <h3 id="faceRegisterStatus">
                Face not captured
            </h3>

            <button 
                type="button" 
                class="register-main-btn"
                onclick="registerVoter()"
            >
                Register Voter
            </button>

            <p id="registerMessage"></p>

        </div>

    </section>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js?v=voterregisterfix1"></script>

</body>
</html>
