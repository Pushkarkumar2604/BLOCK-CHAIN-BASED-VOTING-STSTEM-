<!DOCTYPE html>
<html>
<head>
    <title>Manage Candidates</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadManageCandidatesPage()">

    <nav class="navbar">
        <div class="logo">
            Manage Candidates
        </div>

        <div class="nav-links">
            <a href="admin-dashboard.html">Back to Dashboard</a>
            <a href="index.html">Back to Voting</a>

            <button class="logout-btn" onclick="adminLogout()">
                Logout
            </button>
        </div>
    </nav>

    <div class="dashboard-container">

        <h1>Registered Candidates</h1>

        <button onclick="loadAdminCandidates()">
            Refresh Candidate List
        </button>

        <button class="delete-all-btn" onclick="deleteAllCandidates()">
            Delete All Candidates
        </button>

        <div id="adminCandidateBox"></div>

    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>

</body>
</html>
